{% extends "base.html" %}
{% block title %}Login — DetectAI{% endblock %}
 
{% block head %}
<style>
  .auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }
 
  /* Background grid lines */
  .auth-page::after {
    content: '';
    position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }
 
  .auth-box {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    animation: fadeIn .5s ease both;
  }
 
  .auth-header { text-align: center; margin-bottom: 2.2rem; }
 
  .auth-logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 1.4rem;
    display: block;
  }
 
  .auth-header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
 
  .auth-header p {
    color: var(--muted);
    font-size: 0.88rem;
  }
 
  .auth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.2rem;
  }
 
  .auth-card .form-group label {
    font-size: 0.78rem;
  }
 
  .auth-card .btn-primary {
    width: 100%;
    justify-content: center;
    padding: 13px;
    font-size: 0.85rem;
    margin-top: 0.4rem;
  }
 
  .auth-footer {
    text-align: center;
    margin-top: 1.4rem;
    font-size: 0.83rem;
    color: var(--muted);
  }
 
  .auth-footer a {
    color: var(--accent);
    text-decoration: none;
    font-family: var(--mono);
    font-size: 0.78rem;
  }
  .auth-footer a:hover { text-decoration: underline; }
 
  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }
 
  .corner-deco {
    position: absolute;
    width: 60px; height: 60px;
    border-color: rgba(0,229,160,0.2);
    border-style: solid;
  }
  .corner-deco.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 14px 0 0 0; }
  .corner-deco.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 14px 0; }
</style>
{% endblock %}
 
{% block content %}
<div class="auth-page">
  <div class="auth-box">
 
    <div class="auth-header">
      <span class="auth-logo">[ DETECT<span style="color:var(--muted)">AI</span> ]</span>
      <h1>Welcome back</h1>
      <p>Sign in to your account to continue</p>
    </div>
 
    <div class="auth-card" style="position:relative;">
      <div class="corner-deco tl"></div>
      <div class="corner-deco br"></div>
 
      <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label>USERNAME</label>
          <input type="text" name="username" placeholder="your_username" required autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>PASSWORD</label>
          <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn btn-primary">Sign In →</button>
      </form>
    </div>
 
    <div class="auth-footer">
      Don't have an account? &nbsp;
      <a href="{{ url_for('signup') }}">Create one</a>
    </div>
 
  </div>
</div>
{% endblock %}
